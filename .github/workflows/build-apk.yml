name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21' # Upgraded from 17 to 21 to match Capacitor's requirements

    - name: Prepare Clean Web Folder
      run: |
        mkdir -p www
        cp *.html *.css *.js www/ 2>/dev/null || :
        if [ ! -f www/index.html ]; then echo "<html><body>Error: index.html not found.</body></html>" > www/index.html; fi

    - name: Initialize Capacitor Framework
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Syllabus Tracker" "com.myexam.syllabustracker" --web-dir "www"
        npx cap add android
        npx cap sync android

    - name: Build Android APK (Low Memory Mode)
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SyllabusTracker-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
