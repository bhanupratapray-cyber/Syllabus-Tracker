name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# Fixes the GitHub Node.js deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Upgraded to match modern GitHub standards

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Prepare Clean Web Folder
      run: |
        # Creates a dedicated folder so the Android compiler doesn't choke on node_modules
        mkdir www
        cp index.html style.css script.js www/

    - name: Initialize Capacitor Framework
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        # Pointing the web-dir specifically to our clean 'www' folder
        npx cap init "Syllabus Tracker" "com.myexam.syllabustracker" --web-dir "www"
        npx cap add android
        npx cap sync android

    - name: Build Android APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SyllabusTracker-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
